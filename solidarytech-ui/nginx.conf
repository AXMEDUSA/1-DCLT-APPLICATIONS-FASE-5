server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CORS para requisições ao cluster via port-forward
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type";

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para os serviços — permite rodar tudo via uma única porta
    location /api/ngos {
        proxy_pass http://ngo-service.solidarytech.svc.cluster.local/ngos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/donations {
        proxy_pass http://donation-service.solidarytech.svc.cluster.local/donations;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/volunteers {
        proxy_pass http://volunteer-service.solidarytech.svc.cluster.local/volunteers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        return 200 '{"status":"ok","service":"solidarytech-ui"}';
        add_header Content-Type application/json;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}
