server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 '{"status":"ok","service":"solidarytech-ui"}';
        add_header Content-Type application/json;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
